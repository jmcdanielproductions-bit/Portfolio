<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=index.html#archive">
  <title>Jared McDaniel Archive</title>
  <style>
    :root {
      --bg: #080a0d;
      --ink: #f2eee7;
      --muted: rgba(242, 238, 231, 0.62);
      --blue: #6f8cff;
      --gold: #d6b77a;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(rgba(111, 140, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111, 140, 255, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 24% 18%, rgba(111, 140, 255, 0.18), transparent 36rem),
        var(--bg);
      background-size: 72px 72px, 72px 72px, auto, auto;
      color: var(--ink);
      font-family: "Space Grotesk", Arial, sans-serif;
    }

    main {
      width: min(34rem, calc(100vw - 48px));
      text-align: center;
    }

    h1 {
      margin: 0;
      font: 400 clamp(3.5rem, 10vw, 8rem) / 0.86 Impact, "Arial Narrow", sans-serif;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    p {
      margin: 1rem auto 0;
      max-width: 24rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 1.4rem;
      padding: 0 1.1rem;
      border: 1px solid rgba(111, 140, 255, 0.35);
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
      font: 700 0.72rem / 1 "JetBrains Mono", monospace;
      letter-spacing: 0.12em;
      background: rgba(8, 10, 13, 0.55);
      box-shadow: 0 0 32px rgba(111, 140, 255, 0.12);
    }

    .line {
      width: 8rem;
      height: 1px;
      margin: 1rem auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
  </style>
  <script>
    window.location.replace("index.html#archive");
  </script>
</head>
<body>
  <main>
    <h1>Jared<br>McDaniel</h1>
    <div class="line" aria-hidden="true"></div>
    <p>This prototype has been replaced by the cinematic archive system.</p>
    <a href="index.html#archive">Enter Archive</a>
  </main>
</body>
</html>
