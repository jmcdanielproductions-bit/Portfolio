<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=../index.html#work">
  <title>Work | Jared McDaniel Archive</title>
  <style>
    :root {
      --bg: #080a0d;
      --ink: #f2eee7;
      --muted: rgba(242, 238, 231, 0.62);
      --blue: #6f8cff;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(111, 140, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111, 140, 255, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 24% 18%, rgba(111, 140, 255, 0.18), transparent 36rem),
        var(--bg);
      background-size: 72px 72px, 72px 72px, auto, auto;
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.1rem;
      border: 1px solid rgba(111, 140, 255, 0.35);
      border-radius: 999px;
      background: rgba(8, 10, 13, 0.55);
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }
  </style>
  <script>
    window.location.replace("../index.html#work");
  </script>
</head>
<body>
  <a href="../index.html#work">Enter Work Archive</a>
</body>
</html>
